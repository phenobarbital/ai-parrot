[build-system]
requires = ["setuptools>=77.0.0", "wheel>=0.44.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot-integrations"
dynamic = ["version"]
description = "Messaging channel integrations for AI-Parrot (Slack, Telegram, MS Teams, WhatsApp, Matrix, Voice)"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
keywords = ["ai", "chatbot", "messaging", "telegram", "slack", "msteams", "whatsapp", "matrix"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Communications :: Chat",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "ai-parrot",
]

[project.optional-dependencies]
slack = [
    "slack-sdk>=3.27",
    "slack-bolt>=1.18",
]
telegram = [
    "aiogram>=3.12",
]
msteams = [
    "azure-teambots>=0.1.1",
    "parrot-formdesigner",
    "redis>=5.0",
]
whatsapp = [
    "pywa>=3.8.0",
]
matrix = [
    "mautrix>=0.20",
    "python-olm>=3.2.16",
]
voice-local = [
    "faster-whisper",
]
voice-openai = [
    "openai>=1.0",
]
voice-tts = [
    "pydub>=0.25",
]
voice-supertonic = [
    "onnxruntime>=1.17",
]
voice-moonshine = [
    "useful-moonshine-onnx",
]
voice = [
    "ai-parrot-integrations[voice-local]",
    "ai-parrot-integrations[voice-openai]",
    "ai-parrot-integrations[voice-tts]",
    "ai-parrot-integrations[voice-supertonic]",
    "ai-parrot-integrations[voice-moonshine]",
]
messaging = [
    "ai-parrot-integrations[slack]",
    "ai-parrot-integrations[telegram]",
    "ai-parrot-integrations[msteams]",
    "ai-parrot-integrations[whatsapp]",
]
all = [
    "ai-parrot-integrations[messaging]",
    "ai-parrot-integrations[matrix]",
    "ai-parrot-integrations[voice]",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Source = "https://github.com/phenobarbital/ai-parrot"

[tool.setuptools.dynamic]
version = {attr = "parrot.integrations.version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot*"]
namespaces = true

# Resolve botbuilder-dialogs↔aiogram emoji version clash (FEAT-205 / D3).
# botbuilder-dialogs pins emoji==1.7.0; aiogram>=3.12 does not declare
# a conflicting emoji requirement (tested with aiogram 3.28.2), so pinning
# to 1.7.0 satisfies both. Revisit if aiogram adds an emoji dependency.
[tool.uv]
override-dependencies = ["emoji==1.7.0"]

[tool.uv.sources]
ai-parrot = { workspace = true }
parrot-formdesigner = { workspace = true }
