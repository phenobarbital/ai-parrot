[build-system]
requires = ["setuptools>=67.6.1", "wheel>=0.44.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot-loaders"
dynamic = ["version"]
requires-python = ">=3.11"
description = "Document loaders for AI-Parrot RAG pipelines"
readme = "README.md"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
license = "MIT"
keywords = ["ai", "rag", "document-loaders", "pdf", "youtube", "agents", "asyncio"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "ai-parrot>=0.24.27",
    "decorator>=5",
    "openpyxl>=3.1",
    "tabulate>=0.9",
]

[project.optional-dependencies]
youtube = [
    "pytube==15.0.0",
    "youtube_transcript_api==1.0.3",
    "yt-dlp>=2026.02.21"
]
audio = [
    "whisperx==3.4.2",
    "av==16.1.0",
    "resemblyzer==0.1.4",
    "pyannote-audio==3.4.0",
    "pyannote-core==5.0.0",
    "pyannote-database==5.1.3",
    "pyannote-metrics==3.2.1",
    "pyannote-pipeline==3.0.1",
    "torch-audiomentations==0.12.0",
    "torch-pitch-shift==1.2.5",
    "torchmetrics==1.8.2",
]
pdf = [
    "weasyprint==68.0",
    "fpdf==1.7.2",
    "markdownify[all]>=1.2.2",
    "python-docx==1.1.2",
    "paddleocr==3.2.0",
    "easyocr==1.7.2"
]
images = [
    "easyocr==1.7.2"
]
web = ["beautifulsoup4>=4.12", "html2text>=2024.0"]
ebook = ["ebooklib>=0.19"]
video = ["moviepy==2.2.1", "ffmpeg==1.4"]
document = ["mammoth>=1.11.0"]
scraping = [
    "trafilatura>=1.12",
    "beautifulsoup4>=4.12",
    "markdownify[all]>=1.2.2",
]

# Core ML dependencies required by audio/whisperx
ml = [
    "torch>=2.8.0",
    "torchaudio>=2.8.0",
    "torchvision>=0.26.0",
    "pytorch-lightning==2.5.5",
    "pytorch-metric-learning==2.9.0",
    "nvidia-cudnn-cu12==9.1.0.70",
]

# Heavy ML dependencies (slow install, GPU/ML workloads)
ml-heavy = [
    "torch>=2.8.0",
    "torchaudio>=2.8.0",
    "numpy>=2.1,<2.2",
    "accelerate>=1.1.0",
    "bitsandbytes==0.49.2",
    "datasets>=3.0.2",
    "transformers>=5.0.0",
    "tensorflow>=2.19.1",
    "tf-keras==2.19.0",
    "opencv-python==4.10.0.84",
]

all = ["ai-parrot-loaders[youtube,audio,pdf,images,web,ebook,video,document,scraping,ml,ml-heavy]"]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Repository = "https://github.com/phenobarbital/ai-parrot"
Documentation = "https://github.com/phenobarbital/ai-parrot/"

[tool.setuptools.dynamic]
version = {attr = "parrot_loaders.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot_loaders*"]

[tool.uv.sources]
ai-parrot = { workspace = true }
