Homepage = "https://github.com/phenobarbital/ai-parrot"
Source = "https://github.com/phenobarbital/ai-parrot"
Tracker = "https://github.com/phenobarbital/ai-parrot/issues"
Documentation = "https://github.com/phenobarbital/ai-parrot/"
Funding = "https://paypal.me/phenobarbital"
"Say Thanks!" = "https://saythanks.io/to/phenobarbital"

# ---------------------------------------------------------------------------
# Setuptools — src/ layout
# ---------------------------------------------------------------------------
[tool.setuptools]
# license lives at repo root; omitted to avoid setuptools path restriction

[tool.setuptools.dynamic]
version = {attr = "parrot.version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot*"]
namespaces = true

[tool.setuptools.package-data]
parrot = ["py.typed", "templates/*.tpl"]
"parrot.auth" = ["templates/*.html"]
# parrot.integrations.telegram moved to ai-parrot-integrations
# parrot.voice moved to ai-parrot-integrations
# parrot.outputs.formats.assets moved to ai-parrot-visualizations (FEAT-200)
"parrot.openapi" = ["*.yaml"]
"parrot.knowledge.ontology.defaults" = ["*.yaml", "domains/*.yaml"]
"parrot.forms.renderers" = ["templates/*.j2"]
"parrot.flows.dev_loop" = ["_subagent_data/*.md"]
# Interactive HTML artifact catalog (library specs + scaffold templates),
# loaded from disk at runtime by parrot.tools.interactive.catalog_registry.
"parrot.tools.interactive" = [
    "catalog/*.md",
    "catalog/libraries/*.md",
    "catalog/templates/*.html",
    "catalog/templates/*.meta.yaml",
]
"parrot.storage.security_reports" = ["*.sql"]
# Runtime-loaded bundled pricing tables (calculator.py globs *.json here).
"parrot.observability.cost.pricing" = ["*.json"]
# Schema DDL shipped for manual application.
"parrot.security" = ["*.sql"]
"parrot.pipelines" = ["*.sql"]

# ---------------------------------------------------------------------------
# Maturin (Rust extension)
# ---------------------------------------------------------------------------
[tool.maturin]
python-source = "src/parrot/yaml_rs"
module-name = "parrot.yaml_rs._yaml_rs"
bindings = "pyo3"
features = ["pyo3/extension-module"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.cibuildwheel]
build = "cp3{11,12,13,14}-manylinux_x86_64"
skip = "pp*"

[tool.cibuildwheel.linux]
archs = ["x86_64"]
