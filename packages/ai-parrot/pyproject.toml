# ---------------------------------------------------------------------------
# Setuptools — src/ layout
# ---------------------------------------------------------------------------
[tool.setuptools]
# license lives at repo root; omitted to avoid setuptools path restriction

[tool.setuptools.dynamic]
version = {attr = "parrot.version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot*"]
namespaces = true

[tool.setuptools.package-data]
parrot = ["py.typed", "templates/*.tpl"]
"parrot.integrations.telegram" = ["static/*.html"]
"parrot.voice" = ["ui/*.html", "ui/*.js", "ui/*.css"]
"parrot.outputs.formats.assets" = ["*.js", "*.css"]
"parrot.openapi" = ["*.yaml"]
"parrot.knowledge.ontology.defaults" = ["*.yaml", "domains/*.yaml"]
"parrot.forms.renderers" = ["templates/*.j2"]

# ---------------------------------------------------------------------------
# Maturin (Rust extension)
# ---------------------------------------------------------------------------
[tool.maturin]
python-source = "src/parrot/yaml_rs"
module-name = "parrot.yaml_rs._yaml_rs"
bindings = "pyo3"
features = ["pyo3/extension-module"]

[tool.cibuildwheel]
build = "cp3{11,12,13,14}-manylinux_x86_64"
skip = "pp*"

[tool.cibuildwheel.linux]
archs = ["x86_64"]
