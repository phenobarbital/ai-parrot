[build-system]
requires = [
    "setuptools>=77.0.0",
    "Cython==3.0.11",
    "wheel>=0.44.0"
]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot"
dynamic = ["version"]
description = "Framework for building AI agents for Navigator"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
keywords = ["asyncio", "asyncpg", "aioredis", "aiomcache", "artificial intelligence", "ai", "chatbot", "agents"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Environment :: Web Environment",
    "Topic :: Software Development :: Build Tools",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]

dependencies = [
    # Build tools
    "Cython==3.0.11",
    # Core data / utilities
    "tabulate==0.9.0",
    "markdown2==2.5.4",
    "beautifulsoup4>=4.12",
    "nh3>=0.2.14",
    "python-datamodel>=0.10.17",
    "backoff==2.2.1",
    "typing-extensions>=4.14.1,<5",
    "pydantic==2.12.5",
    "PyYAML>=6.0.2",
    "python-frontmatter>=1.1.0",
    "xmltodict>=0.14.2",
    "tiktoken>=0.9.0",
    "psutil>=5.9",
    # Text splitters live in core (parrot.loaders.splitters) — Rust-backed
    # chunking used by AbstractLoader. Moved here from ai-parrot-loaders to
    # break the circular import (loaders depends on core).
    "semantic-text-splitter>=0.30,<1.0",
    # Navigator stack (core)
    "navconfig[default]>=2.2.2",
    # navigator-auth<=0.20.9 passes a `PolicyEffect` enum (not a str) to the
    # rs_pep Rust engine's `default_effect` arg, causing every ABAC/PBAC
    # evaluation to fail-closed with a PyO3 TypeError. Require >0.20.9.
    "navigator-auth>0.20.9",
    "navigator-session>=0.6.5",
    # navigator-api 3.0.3+ ships the FileManager interface AI-Parrot relies on.
    # 3.1.2 also fixes the aiohttp RequestHandler kwargs warning (invalid
    # client_timeout/max_request_size were silently dropping every custom
    # server setting). Pin to 3.1.2 to prevent silent downgrades and to
    # guarantee that fix is present.
    "navigator-api[uvloop,locale,google]>=3.1.2",
    # Async DB — base only (asyncpg, aiosqlite, pandas, pgvector)
    "asyncdb>=2.11.6",
    # HTTP / networking
    "rich>=13.0",
    # requests is otherwise transitive; pin to the 2.33 series — the intersection
    # of flowtask 5.12.3 (>=2.33.0) and arxiv>=3.0.0 (<2.34).
    "requests>=2.33,<2.34",
    "click>=8.1.7",
    "prompt_toolkit>=3.0",
    "aiohttp-swagger3==0.10.0",
    "aiohttp-sse-client==0.2.1",
    "aiohttp-cors>=0.8.1",
    "brotli==1.2.0",
    "urllib3==2.7.0",
    # aioquic and pylsqpack moved to ai-parrot-server[mcp] extra in FEAT-203
    # API / OpenAPI tools
    "prance>=25.4.8.0",
    "openapi-schema-validator==0.6.3",
    "openapi-spec-validator>=0.7.1",
    # async-notify minimal — full notification backends moved to ai-parrot-integrations[messaging]
    "ddgs>=9.5.2",
    # State machine / workflow (core)
    "python-statemachine==2.5.0",
    "cel-python>=0.4",
    "questionary>=2.1.1",
    # Pandas stays in core (owner decision)
    "pandas>=2.0.0",
    # SQL validation for DatabaseToolkit (FEAT-062)
    "sqlglot>=20.0",
    "numexpr==2.10.2",
    # Episodic memory default backend (FAISS) — required whenever an agent
    # enables episodic memory without an explicit pgvector DSN.
    "faiss-cpu>=1.9.0",
]

[project.scripts]
parrot = "parrot.cli:cli"
# GraphIndex CLI — build an interactive knowledge graph from a code repo.
parrot-graphindex = "parrot.knowledge.graphindex.cli:main"
# LLM Wiki CLI — machine-first codebase KB for coding assistants (FEAT-260).
wikitoolkit = "parrot.knowledge.wiki.cli:main"
# parrot-fs moved to ai-parrot-server in FEAT-203

[project.optional-dependencies]
