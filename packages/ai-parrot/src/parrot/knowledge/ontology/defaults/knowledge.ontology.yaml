name: knowledge
extends: base
version: "1.0"
description: >
  Knowledge layer extending the base ontology with Document and Concept
  entities, covers_topic and is_a relations, and the authoritative_doc_for_topic
  traversal pattern. Enables concept-level routing of topical queries to
  authoritative documents via curated graph edges.

entities:
  # Employee extension: adds team and role properties to the base Employee entity.
  # key_field and collection are immutable — omit them to avoid OntologyMergeError.
  Employee:
    extend: true
    source: workday
    properties:
      - team:
          type: string
          description: Team identifier (used for member_of relation)
      - role:
          type: string
          description: Role within the team (e.g. lead, member, contributor)
    vectorize:
      - role

  Team:
    collection: teams
    key_field: team_id
    properties:
      - team_id:
          type: string
          required: true
          unique: true
          description: Unique team identifier
      - name:
          type: string
          required: true
          description: Team display name
      - description:
          type: string
          description: What the team does
      - department:
          type: string
          description: Department this team belongs to
    vectorize:
      - name
      - description

  Document:
    collection: documents
    source: confluence
    key_field: document_id
    properties:
      - document_id:
          type: string
          required: true
          unique: true
          description: Unique document identifier
      - title:
          type: string
          required: true
          description: Document title
      - doc_type:
          type: string
          enum:
            - policy
            - manual
            - memo
            - guide
            - faq
          description: Document classification
      - version:
          type: string
          description: Document version string
      - effective_date:
          type: date
          description: Date when the document became effective
      - is_current:
          type: boolean
          default: true
          description: Whether this is the current version of the document
      - authority_score:
          type: float
          default: 0.5
          description: "0..1 tie-break weight when multiple primaries match"
      - pageindex_tree_id:
          type: string
          description: >-
            Name of the PageIndex tree (NodeContentStore + JSONTreeStore)
            that holds the document's body. Used by
            PageIndexToolkit.search_documents_scoped to scope the LLM
            tree-walk to documents the graph identified as authoritative.
      - language:
          type: string
          default: en
          description: Document language code
    vectorize:
      - title

  Concept:
    collection: concepts
    key_field: concept_id
    properties:
      - concept_id:
          type: string
          required: true
          unique: true
          description: Unique concept identifier
      - label:
          type: string
          required: true
          description: Primary human-readable label
      - synonyms:
          type: list
          description: Alternative names and synonyms for this concept
      - description:
          type: string
          description: Detailed description of the concept
      - domain:
          type: string
          description: "Disambiguator: 'finance', 'hr', 'sales'"
    vectorize:
      - label
      - description
      - synonyms

relations:
  member_of:
    from: Employee
    to: Team
    edge_collection: member_of_team
    discovery:
      strategy: field_match
      rules:
        - source_field: team
          target_field: team_id
          match_type: exact
          description: Team membership via team field

  covers_topic:
    from: Document
    to: Concept
    edge_collection: doc_covers_concept
    properties:
      - authority:
          type: string
          enum:
            - primary
            - secondary
            - mentions
          required: true
          description: Authority level of this document for the concept
      - confidence:
          type: float
          default: 1.0
          description: Confidence score of the coverage assertion
      - asserted_by:
          type: string
          description: "Curator id or 'auto:ner_v1'"

  is_a:
    from: Concept
    to: Concept
    edge_collection: concept_is_a

traversal_patterns:
  employee_team_workload:
    description: >
      Find what a user's team is working on by traversing member_of
      edges to reach the team node and then collecting all teammates.
      Answers queries like "What is my team working on?".
    trigger_intents:
      - what is my team working on
      - what is my team doing
      - team workload
      - what are we working on
      - my team projects
      - what does my team do
    query_template: |
      LET team_node = (
        FOR t IN 1..1 OUTBOUND @user_id @@member_of_team
          RETURN t
      )[0]
      FOR teammate IN employees
        FOR edge IN member_of_team
          FILTER edge._to == team_node._id
          FILTER teammate._id == edge._from
          RETURN {
            employee: teammate.name,
            email:    teammate.email,
            role:     teammate.role,
            team:     team_node.name
          }
    post_action: none

  authoritative_doc_for_topic:
    description: >
      Route topical queries through curated authority edges into PageIndex.
      Walks Concept taxonomy via is_a so sub-concepts are included; supports
      multi-concept queries via UNION over the resolved concept list.
    trigger_intents:
      - how does
      - how do
      - cómo funciona
      - cómo funcionan
      - what is the policy on
      - cuál es la política de
      - política de
      - explain
      - explícame
    entity_extraction:
      topic:
        type: Concept
        resolver: hybrid_concept_match
        scope: same_tenant
        ambiguity_strategy: rerank_by_authority
        required: true
    query_template: |
      LET concept_family = (
        FOR cid IN @topic_ids
          LET base = DOCUMENT(cid)
          FOR sub IN 0..3 INBOUND base._id @@concept_is_a
            RETURN sub._id
      )
      FOR doc IN documents
        FOR edge IN doc_covers_concept
          FILTER edge._from == doc._id
          FILTER edge._to IN concept_family
          FILTER doc.is_current == true
          FILTER edge.authority == @authority_level
          SORT doc.authority_score DESC, doc.effective_date DESC
          LIMIT 3
          RETURN {
            document_id:       doc.document_id,
            title:             doc.title,
            doc_type:          doc.doc_type,
            version:           doc.version,
            pageindex_tree_id: doc.pageindex_tree_id,
            matched_concept:   DOCUMENT(edge._to).label,
            authority:         edge.authority
          }
    post_action: tool_call
    tool_call:
      toolkit: PageIndexToolkit
      method: search_documents_scoped
      credential_mode: service_account
      parameters:
        tree_names: "{{ graph.rows | map_attr('pageindex_tree_id') | json }}"
        query: "{{ ctx.original_query }}"
        include_tree_context: false
      result_binding: pageindex_hits
      empty_team_behavior: short_circuit
