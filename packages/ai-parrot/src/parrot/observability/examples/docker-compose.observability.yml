# AI-Parrot Observability Stack
# FEAT-177 TASK-1237
#
# Minimal development stack: OpenLIT UI + ClickHouse (OpenLIT storage) + Prometheus.
#
# WARNING: DO NOT deploy this compose file to production as-is.
#          No authentication, no TLS, no volume persistence tuning.
#          For production, consult the OpenLIT and Grafana deployment guides.
#
# Usage:
#   docker compose -f docker-compose.observability.yml up -d
#
# Then open http://localhost:3000 (OpenLIT UI) and run basic_telemetry.py.
#
# Default login (seeded by OpenLIT on first clean start):
#   email:    user@openlit.io
#   password: openlituser
# Change it (or create your own user) under Settings -> Profile after logging in.
# NOTE: this only applies to a clean start. Users persist in the openlit-data
#       volume, so if you already created another account, use that instead.

services:

  # --------------------------------------------------------------------------
  # OpenLIT UI — receives OTLP traces/metrics and displays them
  # --------------------------------------------------------------------------
  openlit-ui:
    image: ghcr.io/openlit/openlit:latest
    container_name: parrot-openlit-ui
    ports:
      - "3000:3000"   # OpenLIT UI (browser)
      - "4318:4318"   # OTLP HTTP receiver (traces + metrics)
      - "4317:4317"   # OTLP gRPC receiver
    environment:
      - INIT_DB_HOST=clickhouse
      - INIT_DB_PORT=8123
      - INIT_DB_DATABASE=openlit
      - INIT_DB_USERNAME=default
      - INIT_DB_PASSWORD=
      # Prisma reads this directly; the image's entrypoint only persists it to
      # /etc/environment, which the Node process does not source. Points at the
      # mounted data volume (resolved relative to prisma/schema.prisma).
      - SQLITE_DATABASE_URL=file:../data/data.db
    volumes:
      # OpenLIT's entrypoint writes a persistent NextAuth secret + SQLite DB
      # here. The directory does not exist in the image, so it must be a volume.
      - openlit-data:/app/client/data
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # ClickHouse — OpenLIT's time-series storage backend
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: parrot-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # TCP/native interface
    volumes:
      # Creates the `openlit` database on first init; OpenLIT migrates tables
      # into it but does not create the database itself.
      - ./clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Prometheus — scrapes OpenLIT metrics endpoint (optional but recommended)
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: parrot-prometheus
    ports:
      - "9090:9090"   # Prometheus UI
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

volumes:
  openlit-data:
