# Per-tenant authority manifest for Acme Corp.
# This file carries only covers_topic and is_a edge instances.
# It is a curator-readable manifest applied by a seed script to ArangoDB.
# Document and Concept definitions live in the tenant ontology files.
name: authority-acme
extends: knowledge
version: "1.0"

