[build-system]
requires = ["setuptools>=77.0.0", "wheel>=0.44.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot-tools"
dynamic = ["version"]
requires-python = ">=3.11"
description = "Tools and toolkits for AI-Parrot agents"
readme = "README.md"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
license = "MIT"
keywords = ["ai", "agents", "tools", "toolkits", "chatbot", "asyncio"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "ai-parrot>=0.25.24",
    "PyGithub>=2.1",
    "ddgs>=9.5.2",
]

[project.optional-dependencies]
# Per-tool extras — users install only what they need
pdf = [
    "weasyprint==69.0",
    "fpdf==1.7.2",
    "markdown>=3.5",
    "markdownify>=1.2.2",
    "python-docx==1.1.2",
]
msword = [
    "python-docx==1.1.2",
    "mammoth>=1.8",
    "markdown>=3.5",
    "markdownify>=1.2.2",
    "beautifulsoup4>=4.12",
    "jinja2>=3.1",
]
jira = ["jira>=3.10"]
slack = ["slack-sdk>=3.0"]
aws = ["boto3>=1.28"]
docker = ["docker>=7.1"]
git = ["gitpython>=3.1"]
analysis = ["pandas>=2.0", "numpy>=1.26", "autoviz>=0.1"]
excel = ["openpyxl>=3.1", "odfpy>=1.4"]
sandbox = ["docker>=7.1"]
codeinterpreter = ["docker>=7.1"]
pulumi = ["pulumi>=3.0"]
kubernetes = ["kubernetes-asyncio>=24.2", "pyyaml>=6.0"]
sitesearch = ["beautifulsoup4>=4.12", "html2text>=2024.0", "markitdown>=0.1.2"]
office365 = ["msgraph-sdk>=1.8", "azure-identity>=1.18", "microsoft-kiota-authentication-azure>=1.2"]
scraping = ["selenium>=4.35", "undetected-chromedriver>=3.5", "webdriver-manager>=4.0", "playwright>=1.52", "rapidfuzz>=3.0"]
# Selenium fallback for JS-heavy article pages reuses the `scraping` extra.
rss = ["feedparser>=6.0.11", "trafilatura>=1.12"]
finance = ["ta-lib>=0.4.32", "pandas-datareader>=0.10.0", "yfinance>=0.2.54", "alpaca-py>=0.43"]
db = ["querysource>=4.1.11", "psycopg-binary>=3.2"]
# 5.12.3 relaxes its requests pin (==2.32.4 -> >=2.33.0), compatible with
# the workspace's requests>=2.34 override.
flowtask = ["flowtask>=5.12.3"]
google = ["aiogoogle>=5.17", "google-api-python-client>=2.151"]
arxiv = ["arxiv>=3.0.0"]
wikipedia = ["wikipedia>=1.4", "mediawikiapi>=1.2"]
weather = ["pyowm>=3.3"]
messaging = ["gmqtt>=0.6", "aioimaplib>=1.1"]
security = []  # cloudsploit is a Docker/Node.js tool, not a PyPI package
all = [
    "ai-parrot-tools[jira,pdf,msword,slack,aws,docker,git,analysis,excel,sandbox,codeinterpreter,pulumi,kubernetes,sitesearch,office365,scraping,finance,db,flowtask,google,arxiv,wikipedia,weather,messaging,security,rss]"
]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Repository = "https://github.com/phenobarbital/ai-parrot"
Documentation = "https://github.com/phenobarbital/ai-parrot/"

[tool.setuptools.dynamic]
version = {attr = "parrot_tools.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot_tools*"]

[tool.setuptools.package-data]
"parrot_tools" = ["py.typed"]
"parrot_tools.cloudsploit" = ["templates/*.html"]
"parrot_tools.security.reports" = ["templates/*.html"]
# Runtime-loaded data (Path(__file__).parent / ...): compliance mappings,
# prebuilt scraping plans, and the AWS IAM policy referenced by inspector.py.
"parrot_tools.security.reports.mappings" = ["*.yaml"]
"parrot_tools.scraping.extraction_plans._prebuilt" = ["*.json"]
"parrot_tools.aws.policies" = ["*.json"]

[tool.uv.sources]
ai-parrot = { workspace = true }
