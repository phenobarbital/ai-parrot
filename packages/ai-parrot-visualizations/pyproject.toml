[build-system]
requires = ["setuptools>=77.0.0", "wheel>=0.44.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot-visualizations"
dynamic = ["version"]
description = "Visualization renderers for AI-Parrot outputs"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
keywords = ["ai", "visualization", "charts", "infographic", "renderers"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "ai-parrot>=0.25.19",
]

[project.optional-dependencies]
matplotlib = ["matplotlib>=3.7"]
seaborn = ["seaborn>=0.13", "matplotlib>=3.7"]
plotly = ["plotly>=5.0"]
altair = ["altair>=5.0"]
echarts = []  # JS-based — ECharts bundled as static asset (assets/echarts.min.js); no Python deps
map = ["folium>=0.14"]
infographic = ["cairosvg", "svglib", "reportlab"]
jinja2 = ["jinja2>=3.0"]
streamlit = ["streamlit>=1.30"]
panel = ["panel>=1.0"]
messaging = []  # card/slack/whatsapp renderers — no heavy Python dependencies
charts = [
    "ai-parrot-visualizations[matplotlib,seaborn,plotly,altair,echarts]",
]
# FEAT-273: A2UI rendering backends. jsonpointer resolves data-model bindings in
# the bake pass (core never depends on it — G8).
a2ui = [
    "jsonpointer>=2.4",
    "ai-parrot-visualizations[map,jinja2,echarts]",
]
a2ui-pdf = [
    "ai-parrot-visualizations[a2ui]",
    "weasyprint>=68.0",
]
all = [
    "ai-parrot-visualizations[charts,map,infographic,jinja2,streamlit,panel,messaging,a2ui]",
]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Source = "https://github.com/phenobarbital/ai-parrot"

[tool.setuptools.dynamic]
version = {attr = "parrot.outputs.formats.version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot*"]
namespaces = true

[tool.setuptools.package-data]
"parrot.outputs.formats.assets" = ["*.js"]

[tool.uv.sources]
ai-parrot = { workspace = true }
