[build-system]
requires = [
    "setuptools>=77.0.0",
    "wheel>=0.44.0"
]
build-backend = "setuptools.build_meta"

[project]
name = "parrot-formdesigner"
dynamic = ["version"]
description = "Platform-agnostic form design and rendering package for AI-Parrot"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
keywords = ["asyncio", "forms", "form-designer", "adaptive-cards", "html5", "ai", "parrot"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Environment :: Web Environment",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]

dependencies = [
    "pydantic>=2.0",
    "aiohttp>=3.9",
    "asyncdb>=2.0",
    "PyYAML>=6.0",
    "jinja2>=3.1",
    "aiogram>=3.12",
    "navigator-auth>=0.20.11",  # FEAT-241: requires add_exclude_provider + register/unregister_exclusions
    "lxml>=6.1.0",
    "reportlab>=4.1.0",
    "pycountry>=23.0",
    "markdown2>=2.5.0",
    "jsonpath-ng>=1.6.1",
    "aioboto3>=12.0",
]

[project.optional-dependencies]
ai-parrot = [
    "ai-parrot>=0.25.23",
]
redis = [
    "redis>=4.5",
]
test = [
    "pypdf>=6.0",
    "jsonschema>=4.0",
    "pytest>=7.0",
    "pytest-asyncio>=0.23",
]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Source = "https://github.com/phenobarbital/ai-parrot"
Tracker = "https://github.com/phenobarbital/ai-parrot/issues"

[tool.setuptools.dynamic]
version = {attr = "parrot_formdesigner.version.__version__"}

# ---------------------------------------------------------------------------
# Setuptools — src/ layout
# ---------------------------------------------------------------------------
[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot_formdesigner*"]

[tool.setuptools.package-data]
"parrot_formdesigner" = ["py.typed"]
"parrot_formdesigner.renderers" = ["templates/*.j2"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
