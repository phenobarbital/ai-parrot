[build-system]
requires = ["setuptools>=67.6.1", "wheel>=0.44.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot-advisors"
dynamic = ["version"]
requires-python = ">=3.11"
description = "Product Advisor and selection matching components for AI-Parrot"
readme = "README.md"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
license = "MIT"
keywords = ["ai", "chatbot", "advisor", "product-selection", "matching", "agents"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "ai-parrot",
    "ai-parrot-embeddings",
    "sqlalchemy",
    "redis>=5.0.0",
    "scikit-learn",
]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Repository = "https://github.com/phenobarbital/ai-parrot"
Documentation = "https://github.com/phenobarbital/ai-parrot/"

[tool.setuptools.dynamic]
version = {attr = "parrot.advisors.version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot*"]
namespaces = true

[tool.setuptools.package-data]
"parrot.advisors" = ["py.typed", "catalog/*.sql"]

[tool.uv.sources]
ai-parrot = { workspace = true }
