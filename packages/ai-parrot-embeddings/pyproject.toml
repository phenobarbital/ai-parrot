[build-system]
requires = ["setuptools>=77.0.0", "wheel>=0.44.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot-embeddings"
dynamic = ["version"]
description = "Concrete embedding, vector-store, and reranker backends for AI-Parrot"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
keywords = ["ai", "rag", "embeddings", "vector-store", "rerankers"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "ai-parrot",
]

[project.optional-dependencies]
# Embedding backends (TASK-1334)
huggingface = [
    "sentence-transformers>=5.0.0",
    "tokenizers>=0.20.0,<=0.22.2",
    "safetensors>=0.4.3",
    "einops>=0.7.0",
    "accelerate>=0.30.0",
    "peft>=0.10.0",
    "xformers>=0.0.27",
    "simsimd>=4.3.1",
    "bm25s[full]==0.2.14",
    "rank_bm25==0.2.2",
    "sentencepiece==0.2.1",
]
google = [
    # The embeddings backend (parrot/embeddings/google.py) uses only the
    # google-genai SDK (`from google import genai`). google-cloud-aiplatform is
    # NOT imported anywhere in this package; declaring it dragged in
    # google-cloud-storage>=3.10.0, conflicting with consumers that pin
    # google-cloud-storage<=3.1.0 (e.g. navigator-api[google]). Keep this extra
    # to google-genai only; add a dedicated `vertex` extra if Vertex SDK use is
    # ever introduced.
    "google-genai>=2.6.0",
]
openai = [
    "openai==2.8.1",
    "tiktoken>=0.9.0",
]

# Vector-store backends (TASK-1335)
pgvector = [
    "pgvector==0.4.1",
]
milvus = [
    "pymilvus==2.4.8",
    "milvus-lite>=2.4.0",
]
arango = [
    "python-arango-async==1.2.0",
]
bigquery = [
    "google-cloud-bigquery>=3.30.0",
]
faiss = []  # faiss-cpu stays in core ai-parrot deps; this extra is a name-only opt-in
chroma = [
    "chromadb==0.6.3",
]

# Reranker backends (TASK-1336)
reranker-local = [
    "sentence-transformers>=5.0.0",
    "tokenizers>=0.20.0,<=0.22.2",
    "safetensors>=0.4.3",
]
reranker-llm = []  # uses existing LLM clients (anthropic/openai/etc.) declared elsewhere

# Aggregator extra (TASK-1334/1335/1336)
all = [
    "ai-parrot-embeddings[huggingface,google,openai,pgvector,milvus,arango,bigquery,faiss,chroma,reranker-local,reranker-llm]",
]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Source = "https://github.com/phenobarbital/ai-parrot"

[tool.setuptools.dynamic]
version = {attr = "parrot.embeddings.version.__version__"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot*"]
namespaces = true

[tool.uv.sources]
ai-parrot = { workspace = true }
