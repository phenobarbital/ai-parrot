[build-system]
requires = ["setuptools>=67.6.1", "wheel>=0.44.0"]
build-backend = "setuptools.build_meta"

[project]
name = "ai-parrot-embeddings"
version = "0.1.0"
description = "Concrete embedding, vector-store, and reranker backends for AI-Parrot"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
    {name = "Jesus Lara", email = "jesuslara@phenobarbital.info"}
]
keywords = ["ai", "rag", "embeddings", "vector-store", "rerankers"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3 :: Only",
    "Framework :: AsyncIO",
    "Typing :: Typed",
]
dependencies = [
    "ai-parrot",
]

[project.optional-dependencies]
# Embedding backends (TASK-1334)
huggingface = [
    "sentence-transformers>=5.0.0",
    "tokenizers>=0.20.0,<=0.22.2",
    "safetensors>=0.4.3",
    "einops>=0.7.0",
    "accelerate>=0.30.0",
    "peft>=0.10.0",
    "xformers>=0.0.27",
    "simsimd>=4.3.1",
    "bm25s[full]==0.2.14",
    "rank_bm25==0.2.2",
    "sentencepiece==0.2.1",
]
google = [
    "google-genai>=2.6.0",
    "google-cloud-aiplatform==1.133.0",
]
openai = [
    "openai==2.8.1",
    "tiktoken>=0.9.0",
]

[project.urls]
Homepage = "https://github.com/phenobarbital/ai-parrot"
Source = "https://github.com/phenobarbital/ai-parrot"

[tool.setuptools.packages.find]
where = ["src"]
include = ["parrot*"]
namespaces = true

[tool.uv.sources]
ai-parrot = { workspace = true }
