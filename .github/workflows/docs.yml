name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'landing/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'packages/ai-parrot/src/parrot/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install doc tooling
        run: pip install -r requirements-docs.txt

      - name: Install ai-parrot (for mkdocstrings imports)
        run: pip install -e packages/ai-parrot || echo "Editable install failed; mkdocstrings will degrade gracefully"
        continue-on-error: true

      - name: Build site
        run: mkdocs build

      - name: Overlay static landing page at site root
        run: cp -R landing/. site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
