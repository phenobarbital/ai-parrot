name: Build and publish AI-Parrot packages

on:
  release:
    types: [created]

jobs:
  build-core:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: packages/ai-parrot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Add Rust to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel maturin twine cython

      - name: Build wheels on Ubuntu
        env:
          CIBW_ARCHS: x86_64
          CIBW_BEFORE_BUILD: "curl https://sh.rustup.rs -sSf | sh -s -- -y && source $HOME/.cargo/env"
          CIBW_ENVIRONMENT: "PATH=/root/.cargo/bin:$PATH"
          RUST_SUBPACKAGE_PATH: src/parrot/yaml_rs
          CIBW_BUILD: "cp3{10,11,12}-*"
        run: |
          pip install cibuildwheel
          cibuildwheel --platform linux --output-dir ../../dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: ../../dist/*.whl
