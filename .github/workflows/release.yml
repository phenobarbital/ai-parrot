name: Build and publish AI-Parrot packages

on:
  release:
    types: [created]

jobs:
  build-core:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    defaults:
      run:
        working-directory: packages/ai-parrot
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Add Rust to PATH
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cibuildwheel maturin twine cython build

      - name: Build wheels on Ubuntu
        env:
          CIBW_ARCHS: x86_64
          CIBW_BEFORE_BUILD: "curl https://sh.rustup.rs -sSf | sh -s -- -y && source $HOME/.cargo/env"
          CIBW_ENVIRONMENT: "PATH=/root/.cargo/bin:$PATH"
          RUST_SUBPACKAGE_PATH: src/parrot/yaml_rs
          CIBW_BUILD: "cp3{11,12,13,14}-*"
        run: |
          pip install cibuildwheel
          cibuildwheel --platform linux --output-dir ${{ github.workspace }}/dist

      - name: Build sdist
        if: matrix.python-version == '3.12'
        working-directory: packages/ai-parrot
        run: python -m build --sdist --outdir ${{ github.workspace }}/dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: core-dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            ${{ github.workspace }}/dist/*.whl
            ${{ github.workspace }}/dist/*.tar.gz

  build-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          cd packages/ai-parrot-tools
          uv build --out-dir ../../dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-tools
          path: dist/*

  build-loaders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          cd packages/ai-parrot-loaders
          uv build --out-dir ../../dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-loaders
          path: dist/*

  build-pipelines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          cd packages/ai-parrot-pipelines
          uv build --out-dir ../../dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-pipelines
          path: dist/*

  deploy:
    needs: [build-core, build-tools, build-loaders, build-pipelines]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect all distributions
        run: |
          mkdir -p dist
          find dist-artifacts -name '*.whl' -o -name '*.tar.gz' | xargs -I{} mv {} dist/

      - name: List distributions
        run: ls -l dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
