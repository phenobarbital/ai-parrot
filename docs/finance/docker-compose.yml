# docker-compose.yml
services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    restart: always
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-}
      TWOFA_TIMEOUT_ACTION: restart
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-}
      TIME_ZONE: ${TIME_ZONE:-Europe/Madrid}
      TWS_ACCEPT_INCOMING: accept
      TWS_SETTINGS_PATH: /home/ibgateway/tws_settings
    ports:
      - "127.0.0.1:4004:4004" # socat relay → paper API
      - "127.0.0.1:4001:4001" # live API
      - "127.0.0.1:5900:5900" # VNC — solo localhost
    volumes:
      - ./tws_settings:/home/ibgateway/tws_settings
